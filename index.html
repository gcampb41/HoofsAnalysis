<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HoofsAnalysis Reports</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #2563eb;
      --border: #e5e7eb;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --card: #111827;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --accent: #60a5fa;
        --border: #334155;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 2rem 1rem 3rem;
    }
    h1 { margin: 0; font-size: clamp(1.6rem, 3vw, 2.2rem); }
    .subtitle { color: var(--muted); margin-top: .5rem; }
    .status { margin-top: 1rem; color: var(--muted); font-size: .95rem; }
    .grid {
      margin-top: 1.5rem;
      display: grid;
      gap: .9rem;
    }
    .card {
      border: 1px solid var(--border);
      background: var(--card);
      border-radius: .7rem;
      padding: .85rem 1rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: .8rem;
      align-items: center;
    }
    .date { font-weight: 700; }
    .links { display: flex; gap: .75rem; flex-wrap: wrap; }
    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      border: 1px solid transparent;
      padding: .25rem .45rem;
      border-radius: .45rem;
    }
    a:hover { text-decoration: underline; }
    .badge {
      display: inline-block;
      margin-left: .45rem;
      font-size: .75rem;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: .4rem;
      padding: .1rem .35rem;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>HoofsAnalysis Report Archive</h1>
    <p class="subtitle">This page auto-discovers report files from the repository and updates as files are added or removed.</p>
    <div class="status" id="status">Loading reports…</div>
    <section id="report-grid" class="grid" aria-live="polite"></section>
  </main>

  <script>
    const owner = "gcampb41";
    const repo = "HoofsAnalysis";
    const branch = "main";

    const statusEl = document.getElementById("status");
    const gridEl = document.getElementById("report-grid");

    function classify(filename) {
      const scored = filename.match(/^(\d{4}-\d{2}-\d{2})_scored_picks\.html$/);
      if (scored) return { date: scored[1], type: "scored", label: "Scored Picks" };
      const companion = filename.match(/^(\d{4}-\d{2}-\d{2})_runner_metric_companion\.html$/);
      if (companion) return { date: companion[1], type: "companion", label: "Runner Metric Companion" };
      return null;
    }

    function render(groups) {
      if (!groups.length) {
        statusEl.textContent = "No report files were found.";
        return;
      }

      statusEl.textContent = `Found ${groups.length} reporting date${groups.length === 1 ? "" : "s"}.`;
      const frag = document.createDocumentFragment();

      for (const g of groups) {
        const card = document.createElement("article");
        card.className = "card";

        const left = document.createElement("div");
        left.className = "date";
        left.textContent = g.date;
        if (!g.scored || !g.companion) {
          const badge = document.createElement("span");
          badge.className = "badge";
          badge.textContent = "partial";
          left.appendChild(badge);
        }

        const links = document.createElement("div");
        links.className = "links";

        if (g.scored) {
          const a = document.createElement("a");
          a.href = g.scored;
          a.textContent = "Scored Picks";
          links.appendChild(a);
        }

        if (g.companion) {
          const a = document.createElement("a");
          a.href = g.companion;
          a.textContent = "Runner Metric Companion";
          links.appendChild(a);
        }

        card.append(left, links);
        frag.appendChild(card);
      }

      gridEl.replaceChildren(frag);
    }

    async function loadReports() {
      const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents?ref=${branch}`;
      try {
        const res = await fetch(apiUrl, { headers: { Accept: "application/vnd.github+json" } });
        if (!res.ok) throw new Error(`GitHub API error (${res.status})`);

        const rootItems = await res.json();
        const files = rootItems
          .filter(item => item.type === "file" && item.name.endsWith(".html"))
          .map(item => item.name);

        const byDate = new Map();
        for (const file of files) {
          const info = classify(file);
          if (!info) continue;
          if (!byDate.has(info.date)) byDate.set(info.date, { date: info.date, scored: null, companion: null });
          const entry = byDate.get(info.date);
          if (info.type === "scored") entry.scored = file;
          if (info.type === "companion") entry.companion = file;
        }

        const groups = Array.from(byDate.values()).sort((a, b) => b.date.localeCompare(a.date));
        render(groups);
      } catch (err) {
        statusEl.textContent = "Could not load report listing from GitHub API.";
        const msg = document.createElement("p");
        msg.className = "subtitle";
        msg.textContent = `Error: ${err.message}`;
        gridEl.replaceChildren(msg);
      }
    }

    loadReports();
  </script>
</body>
</html>
